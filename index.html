<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Rex Runner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">T-REX RUNNER</h1>
            <div class="score-box">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">00000</span>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
            
            <div class="game-over-modal" id="gameOverModal">
                <div class="modal-content">
                    <h2 class="game-over-text">GAME OVER</h2>
                    <div class="final-score-box">
                        <p>SCORE</p>
                        <p id="finalScore">00000</p>
                    </div>
                    <img src="assets/restart.png" id="restartBtn" alt="Reiniciar" class="restart-btn">
                </div>
            </div>
        </div>

        <footer class="game-footer">
            <p>Made by <span class="author-name">Kaio Silva</span> • <a href="https://github.com/kaiosilva" target="_blank">github.com/kaiosilva</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
